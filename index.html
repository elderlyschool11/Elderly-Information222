<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      (function(l) {
        // Store the base path (where index.html is actually located)
        window.__APP_BASENAME__ = l.pathname.endsWith('/') ? l.pathname.slice(0, -1) : l.pathname;
        
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).filter(function(s) {
            return s.slice(0, 2) === 'p='
          })[0];
          if (decoded) {
            window.history.replaceState(null, null,
              window.__APP_BASENAME__ + decoded.slice(2) +
              l.hash
            );
          }
        }
      }(window.location))
    </script>
    <title>ระบบลงทะเบียนโรงเรียนผู้สูงอายุ - เทศบาลเมืองแสนสุข</title>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
