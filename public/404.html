<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      
      // Guess pathSegmentCount: 1 if it looks like username.github.io/repo-name/
      // If we are on github.io, we assume there's a repo-name if we're not at the root.
      // However, we can be more explicit: if the hostname contains github.io and is not a custom domain.
      var pathSegmentCount = (l.hostname.indexOf('github.io') !== -1 && l.hostname.split('.').length === 3) ? 1 : 0;

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
